# docker-compose.yml — Velox AI full local development stack
#
# Brings up every service needed to run the entire platform locally:
#
#   Infrastructure
#     db        → PostgreSQL 15 + pgvector (port 5432)
#     redis     → Redis 7 session cache    (port 6379)
#     mlflow    → MLflow tracking server   (port 5000)  [profile: mlflow]
#
#   Application
#     api       → Node.js / Express backend (port 8080)
#     web       → React / Vite frontend     (port 5173)
#
#   AI Pipeline
#     agents    → Python FastAPI + SGLang routing (port 8000)
#     voice     → Pipecat voice pipeline          (port 8003)
#
# LLM Inference:
#   SGLang on Modal (external) hosts T1/T2 models (Nemotron Nano, Qwen 32B)
#   Kimi K2.5 API for T3 heavy queries
#
# ── Quick start ──────────────────────────────────────────────────────────────
#   cp .env.example .env                  # fill in real API keys
#   docker compose up --build             # core stack
#
# ── Optional profiles ────────────────────────────────────────────────────────
#   --profile mlflow → add MLflow experiment tracking UI
#
# ── Migrations run automatically on API startup via docker-entrypoint.sh ────
#   New DB: auto-applied on first boot
#   Existing DB without migration history: auto-baselined then deployed
#
# ── Stripe webhooks (local dev) ──────────────────────────────────────────────
#   stripe listen --forward-to http://localhost:8080/stripe/webhook

version: '3.8'

# ─── Shared network ────────────────────────────────────────────────────────────
networks:
  velox_net:
    driver: bridge

# ─── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mlflow_data:

# ─── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 15 + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg15
    container_name: velox_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: velox_local
    ports:
      - "5433:5432"    # host 5433 → avoid conflict with local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d velox_local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - velox_net

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: velox_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - "6380:6379"    # host 6380 → avoid conflict with existing redis on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - velox_net

  # ── MLflow tracking server ─────────────────────────────────────────────────────
  # Optional — start with: docker compose --profile mlflow up
  # UI: http://localhost:5000
  # Set MLFLOW_TRACKING_URI=http://mlflow:5000 in the api service (already default)
  mlflow:
    profiles: ["mlflow"]
    image: ghcr.io/mlflow/mlflow:v2.15.1
    container_name: velox_mlflow
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow/mlflow.db
        --default-artifact-root /mlflow/artifacts
    ports:
      - "5001:5000"    # host 5001 → macOS AirPlay receiver uses 5000
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/')\" 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - velox_net

  # ── LLM Agent Service (SGLang routing) ────────────────────────────────────────
  # Handles LLM routing: T1 (Nemotron Nano) → T2 (Qwen 32B) → T3 (Kimi K2.5)
  # Exposes POST /generate used by velox-api orchestrator.ts
  # Host port 8002 avoids conflicts with other local services on 8000/8001
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: velox_agents
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      - PORT=8000
      # SGLang (self-hosted on Modal) for T1/T2 models
      - LLM_PROVIDER=${LLM_PROVIDER:-sglang}
      - SGLANG_BASE_URL=${SGLANG_BASE_URL:-}
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}
      - SGLANG_MODEL_T0=${SGLANG_MODEL_T0:-Qwen/Qwen2.5-3B-Instruct}
      - SGLANG_MODEL_T1=${SGLANG_MODEL_T1:-nvidia/Nemotron-3-Nano-4B-Instruct}
      - SGLANG_MODEL_T2=${SGLANG_MODEL_T2:-Qwen/Qwen2.5-32B-Instruct}
      # Kimi for T3 fallback
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      # OpenAI (alternative)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - velox_net

  # ── Pipecat Voice Service ─────────────────────────────────────────────────────
  # Handles voice calls via Daily.co WebRTC + Twilio PSTN bridge
  # Target latency: <800ms voice-to-voice
  # Prometheus metrics: http://localhost:8003/metrics
  # Health check:       http://localhost:8003/health
  voice:
    build:
      context: ./voice
      dockerfile: Dockerfile
    container_name: velox_voice
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - DATABASE_URL=postgresql+asyncpg://postgres:devpass@db:5432/velox_local
      - REDIS_HOST=redis
      - REDIS_PORT=6379

      # ── Daily.co (WebRTC transport) ─────────────────────────────────────────────
      - DAILY_API_KEY=${DAILY_API_KEY:-}

      # ── STT / TTS ───────────────────────────────────────────────────────────────
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}

      # ── LLM Providers ───────────────────────────────────────────────────────────
      - LLM_PROVIDER=${LLM_PROVIDER:-sglang}
      - SGLANG_BASE_URL=${SGLANG_BASE_URL:-}
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}
      - SGLANG_MODEL_T1=${SGLANG_MODEL_T1:-nvidia/Nemotron-3-Nano-4B-Instruct}
      - SGLANG_MODEL_T2=${SGLANG_MODEL_T2:-Qwen/Qwen2.5-32B-Instruct}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── Twilio ──────────────────────────────────────────────────────────────────
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}

      # ── Internal API auth ───────────────────────────────────────────────────────
      - BILLING_API_URL=http://api:8080
      - VOICE_INTERNAL_SECRET=${VOICE_INTERNAL_SECRET:-dev-voice-secret}

      # ── Observability ───────────────────────────────────────────────────────────
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - velox_net

  # ── Node.js / Express backend API ─────────────────────────────────────────────
  # Handles: Twilio webhooks, WebSocket media stream, billing, RAG, agent CRUD
  # Prometheus metrics: http://localhost:8080/metrics
  # Health check:       http://localhost:8080/health
  api:
    build:
      context: ./velox-api
      dockerfile: Dockerfile
    container_name: velox_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── Core ────────────────────────────────────────────────────────────────
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=postgresql://postgres:devpass@db:5432/velox_local
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379

      # ── CORS ─────────────────────────────────────────────────────────────────
      - DASHBOARD_URL=http://localhost:5173

      # ── External APIs (required) ──────────────────────────────────────────────
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY}

      # ── Stripe ───────────────────────────────────────────────────────────────
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_STARTER_PRICE_ID=${STRIPE_STARTER_PRICE_ID:-}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-}
      - STRIPE_ENTERPRISE_PRICE_ID=${STRIPE_ENTERPRISE_PRICE_ID:-}

      # ── LLM Agent pipeline ───────────────────────────────────────────────────
      # Leave blank to fall back to the local inline LLMService
      - AGENTS_SERVICE_URL=http://agents:8000
      # SGLang (for direct API calls from Node.js)
      - SGLANG_BASE_URL=${SGLANG_BASE_URL:-}
      - SGLANG_API_KEY=${SGLANG_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - KIMI_BASE_URL=${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      - LLM_PROVIDER=${LLM_PROVIDER:-sglang}

      # ── Observability (optional — graceful no-op when blank) ──────────────────
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - MLFLOW_TRACKING_URI=http://mlflow:5000

      # ── Admin / eval endpoint ─────────────────────────────────────────────────
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-admin-key-change-me}

      # ── Tool integrations (all optional — degrade gracefully when absent) ──────
      - ORDER_API_URL=${ORDER_API_URL:-}
      - ORDER_API_KEY=${ORDER_API_KEY:-}
      - INVENTORY_API_URL=${INVENTORY_API_URL:-}
      - CALENDAR_API_URL=${CALENDAR_API_URL:-}
      - CRM_API_URL=${CRM_API_URL:-}
      - HANDOFF_API_URL=${HANDOFF_API_URL:-}
      - FAQ_KB_ID=${FAQ_KB_ID:-}

      # ── ElevenLabs TTS (optional — voices prefixed "el_" route here) ───────────
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s   # Prisma init + TTS filler pre-warm
    networks:
      - velox_net

  # ── React / Vite frontend ─────────────────────────────────────────────────────
  # Served by nginx on port 80 inside the container, exposed on host port 5173.
  # Build-time args are baked into the static bundle (VITE_* vars).
  web:
    build:
      context: ./velox-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    container_name: velox_web
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://api:8080
      - VITE_AGENTS_URL=http://agents:8000
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      api:
        condition: service_healthy
      agents:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ | grep -q html"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - velox_net
