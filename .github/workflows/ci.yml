# .github/workflows/ci.yml
#
# Velox AI — Continuous Integration Pipeline
#
# Reference: docs/architecture/08-mlops-cicd.md §8.3
#
# Runs on every PR and push to main:
#   1. Lint (ESLint + Prettier check)
#   2. Type check (tsc --noEmit)
#   3. Unit tests (Jest for Node, pytest for Python)
#   4. Build verification
#
# LLM quality tests (DeepEval) run separately in Cloud Build
# to avoid API key exposure in GitHub Actions.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Node.js API (velox-api) ────────────────────────────────────────────────
  api-lint-test:
    name: API - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: velox-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: velox-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost/test

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci --coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost/test
          REDIS_HOST: localhost
          GEMINI_API_KEY: test-key
          DEEPGRAM_API_KEY: test-key
          CLERK_SECRET_KEY: test-key
          STRIPE_SECRET_KEY: sk_test_fake
          ADMIN_API_KEY: test-admin-key

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: velox-api/coverage
          flags: api
          fail_ci_if_error: false

  api-build:
    name: API - Build
    runs-on: ubuntu-latest
    needs: api-lint-test
    defaults:
      run:
        working-directory: velox-api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: velox-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost/test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/src/server.js
          echo "Build successful"

  # ─── Python Agents (agents/) ────────────────────────────────────────────────
  agents-lint-test:
    name: Agents - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff

      - name: Lint with Ruff
        run: ruff check . --ignore E501

      - name: Unit tests
        run: pytest tests/ -v --cov=. --cov-report=xml
        env:
          GEMINI_API_KEY: test-key
          PHI3_SERVICE_URL: ""

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: agents
          flags: agents
          fail_ci_if_error: false

  # ─── Docker Build Verification ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api-lint-test, agents-lint-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./velox-api
          push: false
          tags: velox-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Agents image
        uses: docker/build-push-action@v5
        with:
          context: ./agents
          push: false
          tags: velox-agents:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security Scan ──────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
